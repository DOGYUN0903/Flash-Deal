# workflow 이름
name: flashdeal-ci/cd
# Redis session deploy trigger comment

on:
  push:
    branches:
      - dev
      - v2/scale-out
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - 'monitoring/**'

jobs:
  # ==================================
  # Job 1: 빌드 및 Docker 이미지 푸시
  # ==================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/flash-deal:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flash-deal:latest

  # ==================================
  # Job 2: 모니터링 서버 배포 (Prometheus + Grafana)
  # ==================================
  deploy-monitoring:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy monitoring files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NCP_MONITORING_IP }}
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          source: "monitoring/docker-compose.yml"
          target: "/root"

      - name: Deploy monitoring
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NCP_MONITORING_IP }}
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            cd /root/monitoring

            mkdir -p prometheus
            cat > prometheus/prometheus.yml << EOF
            global:
              scrape_interval: 5s
              evaluation_interval: 5s

            scrape_configs:
              - job_name: 'flash-deal'
                metrics_path: '/actuator/prometheus'
                static_configs:
                  - targets:
                      - '${{ secrets.NCP_APP_IP_1 }}:8080'
                      - '${{ secrets.NCP_APP_IP_2 }}:8080'
                      - '${{ secrets.NCP_APP_IP_3 }}:8080'
                    labels:
                      group: 'flash-deal-v2'
            EOF

            docker compose down || true
            docker compose up -d
            docker compose ps

  # ==================================
  # Job 3: App 서버 1 배포 (모니터링 서버 경유)
  # ==================================
  deploy-app-1:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy files to app server 1
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NCP_APP_IP_1 }}
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          proxy_host: ${{ secrets.NCP_MONITORING_IP }}
          proxy_username: root
          proxy_key: ${{ secrets.NCP_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/root/flashdeal-app"

      - name: Deploy to app server 1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NCP_APP_IP_1 }}
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          proxy_host: ${{ secrets.NCP_MONITORING_IP }}
          proxy_username: root
          proxy_key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            cd /root/flashdeal-app

            cat > .env << EOF
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_DBNAME=${{ secrets.MYSQL_DBNAME }}
            MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}
            TOSS_BASE_URL=${{ secrets.TOSS_BASE_URL }}
            NCP_ACCESS_KEY=${{ secrets.NCP_ACCESS_KEY }}
            NCP_SECRET_KEY=${{ secrets.NCP_SECRET_KEY }}
            NCP_DEFAULT_IMAGE_URL=${{ secrets.NCP_DEFAULT_IMAGE_URL }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            SPRING_PROFILES_ACTIVE=prod
            EOF

            docker compose -f docker-compose.prod.yml down || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flash-deal:latest
            docker image prune -f
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps

  # ==================================
  # Job 4: App 서버 2 배포 (모니터링 서버 경유)
  # ==================================
  deploy-app-2:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy files to app server 2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NCP_APP_IP_2 }}
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          proxy_host: ${{ secrets.NCP_MONITORING_IP }}
          proxy_username: root
          proxy_key: ${{ secrets.NCP_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/root/flashdeal-app"

      - name: Deploy to app server 2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NCP_APP_IP_2 }}
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          proxy_host: ${{ secrets.NCP_MONITORING_IP }}
          proxy_username: root
          proxy_key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            cd /root/flashdeal-app

            cat > .env << EOF
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_DBNAME=${{ secrets.MYSQL_DBNAME }}
            MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}
            TOSS_BASE_URL=${{ secrets.TOSS_BASE_URL }}
            NCP_ACCESS_KEY=${{ secrets.NCP_ACCESS_KEY }}
            NCP_SECRET_KEY=${{ secrets.NCP_SECRET_KEY }}
            NCP_DEFAULT_IMAGE_URL=${{ secrets.NCP_DEFAULT_IMAGE_URL }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            SPRING_PROFILES_ACTIVE=prod
            EOF

            docker compose -f docker-compose.prod.yml down || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flash-deal:latest
            docker image prune -f
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps

  # ==================================
  # Job 5: App 서버 3 배포 (모니터링 서버 경유)
  # ==================================
  deploy-app-3:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy files to app server 3
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NCP_APP_IP_3 }}
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          proxy_host: ${{ secrets.NCP_MONITORING_IP }}
          proxy_username: root
          proxy_key: ${{ secrets.NCP_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/root/flashdeal-app"

      - name: Deploy to app server 3
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NCP_APP_IP_3 }}
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          proxy_host: ${{ secrets.NCP_MONITORING_IP }}
          proxy_username: root
          proxy_key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            cd /root/flashdeal-app

            cat > .env << EOF
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_DBNAME=${{ secrets.MYSQL_DBNAME }}
            MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}
            TOSS_BASE_URL=${{ secrets.TOSS_BASE_URL }}
            NCP_ACCESS_KEY=${{ secrets.NCP_ACCESS_KEY }}
            NCP_SECRET_KEY=${{ secrets.NCP_SECRET_KEY }}
            NCP_DEFAULT_IMAGE_URL=${{ secrets.NCP_DEFAULT_IMAGE_URL }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            SPRING_PROFILES_ACTIVE=prod
            EOF

            docker compose -f docker-compose.prod.yml down || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flash-deal:latest
            docker image prune -f
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps

  # ==================================
  # Job 6: 배포 결과 확인
  # ==================================
  verify:
    needs: [deploy-monitoring, deploy-app-1, deploy-app-2, deploy-app-3]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ 전체 배포 성공!"
          else
            echo "❌ 배포 실패!"
          fi
