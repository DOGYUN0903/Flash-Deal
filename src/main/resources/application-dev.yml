# 개발 환경 설정 (MySQL)
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_DEV_HOST:localhost:3306}/${MYSQL_DEV_DBNAME:flashdeal}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_DEV_USERNAME:root}
    password: ${MYSQL_DEV_PASSWORD:1234}

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

toss:
  base-url: ${TOSS_BASE_URL:https://api.tosspayments.com}
  secret-key: ${TOSS_SECRET_KEY:test_sk_zXLkKEypNArWmo50nX3lmeaxYG5R}