# 개발 환경 설정 (MySQL)
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_DEV_HOST}/${MYSQL_DEV_DBNAME}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_DEV_USERNAME}
    password: ${MYSQL_DEV_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
