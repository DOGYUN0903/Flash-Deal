version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: flash-deal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_DEV_PASSWORD:-1234}
      MYSQL_DATABASE: ${MYSQL_DEV_DBNAME:-flash_deal_dev}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  prometheus:
    image: prom/prometheus:latest
    container_name: flash-deal-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: flash-deal-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  mysql-data:
