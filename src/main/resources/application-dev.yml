# 개발 환경 설정 (MySQL)
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_DEV_HOST:localhost:3306}/${MYSQL_DEV_DBNAME:flashdeal}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_DEV_USERNAME:root}
    password: ${MYSQL_DEV_PASSWORD:1234}

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

toss:
  base-url: ${TOSS_BASE_URL}
  secret-key: ${TOSS_SECRET_KEY}

ncp:
  object-storage:
    endpoint: https://kr.object.ncloudstorage.com
    region: kr-standard
    access-key: ${NCP_ACCESS_KEY:}
    secret-key: ${NCP_SECRET_KEY:}
    bucket: ${NCP_BUCKET:flash-deal-images}